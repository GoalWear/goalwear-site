<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoalWear 2026/27</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <img src="assets/logo.png" class="logo-header">
  <h1>GOALWEAR</h1>
  <p>Maglie 2026/27 - Nuovi Prezzi 🔥</p>
</header>

<main>

<div class="promo">
  🚚 Spedizione 4€ — GRATIS se compri 3 maglie!
</div>

<div class="leagues">
  <button onclick="showLeague('seriea')">Serie A</button>
  <button onclick="showLeague('nazionali')">Nazionali</button>
</div>

<div id="seriea" class="products league-section" style="display:none;">
  <button onclick="selectTeam('Milan', 'assets/milan.webp')">
    <img src="assets/milan.webp"> Milan
  </button>
</div>

<div id="nazionali" class="products league-section" style="display:none;">
  <button onclick="selectTeam('Italia', 'assets/italy.webp')">
    <img src="assets/italy.webp"> Italia
  </button>
</div>

<div id="formContainer" style="display:none;">
  <img id="productImage" class="product-img">

  <form>
    <h3 id="teamTitle"></h3>

    <label>Versione:</label>
    <select id="version" onchange="updatePrice()">
      <option value="fan">Fan 18€</option>
      <option value="player">Player 24€</option>
    </select>

    <label>Taglia:</label>
    <select id="size">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <label class="checkbox">
      <input type="checkbox" id="custom"> Nome + Numero (+5€)
    </label>

    <label class="checkbox">
      <input type="checkbox" id="patch"> Patch (+1€)
    </label>

    <div id="customFields" style="display:none;">
      <input type="text" id="customName" placeholder="Nome">
      <input type="text" id="customNumber" placeholder="Numero">
    </div>

    <p id="price">Prezzo: 18€</p>

    <input type="text" id="fullname" placeholder="Nome e Cognome" required>
    <input type="text" id="via" placeholder="Via e Civico" required>
    <input type="text" id="citta" placeholder="Città" required>
    <input type="text" id="provincia" placeholder="Provincia" required>
    <input type="text" id="cap" placeholder="CAP" required>
    <input type="text" id="phone" placeholder="Telefono" required>

    <button type="button" onclick="submitOrder()">Ordina su WhatsApp</button>
  </form>
</div>

</main>

<footer>
  © 2026 GoalWear
</footer>

<script src="script.js"></script>
</body>
</html>
