<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalWear 2026/27</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="assets/logo.png" class="logo-header">
  <h1>GOALWEAR</h1>
  <p>Maglie 2026/27</p>
</header>

<main>

<div class="promo">
🔥 FAN 18€ | PLAYER 24€ | SPEDIZIONE GRATIS SE PRENDI 3 MAGLIE
</div>

<div class="leagues">
  <button onclick="showLeague('seriea')">Serie A</button>
  <button onclick="showLeague('nazionali')">Nazionali</button>
  <button onclick="showLeague('premierleague')">Premier League</button>
  <button onclick="showLeague('laliga')">La Liga</button>
  <button onclick="showLeague('ligue1')">Ligue 1</button>
</div>

<!-- SERIE A -->
<div id="seriea" class="products league-section">
  <button onclick="selectTeam('Milan', 'assets/milan.webp')">
    <img src="assets/milan.webp"> Milan
  </button>
  <button onclick="selectTeam('Inter', 'assets/inter.webp')">
    <img src="assets/inter.webp"> Inter
  </button>
  <button onclick="selectTeam('Juventus', 'assets/juve.webp')">
    <img src="assets/juve.webp"> Juventus
  </button>
</div>

<!-- NAZIONALI -->
<div id="nazionali" class="products league-section" style="display:none;">
  <button onclick="selectTeam('Italia', 'assets/italy.webp')">
    <img src="assets/italy.webp"> Italia
  </button>
  <button onclick="selectTeam('Portogallo', 'assets/portogallo.webp')">
    <img src="assets/portogallo.webp"> Portogallo
  </button>
</div>

<!-- PREMIER -->
<div id="premierleague" class="products league-section" style="display:none;">
  <button onclick="selectTeam('Manchester City', 'assets/city.webp')">
    <img src="assets/city.webp"> City
  </button>
  <button onclick="selectTeam('Chelsea', 'assets/chelsea.webp')">
    <img src="assets/chelsea.webp"> Chelsea
  </button>
</div>

<!-- LALIGA -->
<div id="laliga" class="products league-section" style="display:none;">
  <button onclick="selectTeam('Real Madrid', 'assets/real.webp')">
    <img src="assets/real.webp"> Real Madrid
  </button>
  <button onclick="selectTeam('Barcellona', 'assets/barcellona.webp')">
    <img src="assets/barcellona.webp"> Barcellona
  </button>
</div>

<!-- LIGUE 1 -->
<div id="ligue1" class="products league-section" style="display:none;">
  <button onclick="selectTeam('PSG', 'assets/psg.webp')">
    <img src="assets/psg.webp"> PSG
  </button>
</div>

<!-- FORM -->
<div id="formContainer" style="display:none;">
  <img id="productImage" class="product-img">

  <h3 id="teamTitle"></h3>

  <select id="version">
    <option value="fan">Fan 18€</option>
    <option value="player">Player 24€</option>
  </select>

  <select id="size">
    <option>S</option><option>M</option><option>L</option><option>XL</option>
  </select>

  <label class="checkbox">
    <input type="checkbox" id="custom"> Nome + Numero (+5€)
  </label>

  <label class="checkbox">
    <input type="checkbox" id="patch"> Patch (+1€)
  </label>

  <div id="customFields" style="display:none;">
    <input type="text" id="customName" placeholder="Nome">
    <input type="text" id="customNumber" placeholder="Numero">
  </div>

  <p id="price">Prezzo: 18€</p>

  <input type="text" id="fullname" placeholder="Nome e Cognome">
  <input type="text" id="via" placeholder="Via e Civico">
  <input type="text" id="citta" placeholder="Città">
  <input type="text" id="provincia" placeholder="Provincia">
  <input type="text" id="cap" placeholder="CAP">
  <input type="text" id="phone" placeholder="Telefono">

  <button onclick="submitOrder()">Ordina su WhatsApp</button>
</div>

</main>

<footer>
© GoalWear 2026
</footer>

<script src="script.js"></script>
</body>
</html>
