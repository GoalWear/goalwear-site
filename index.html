<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoalWear</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="assets/logo.png" class="logo">

<h1>GOALWEAR</h1>

<p>Maglie calcio 2026</p>

</header>


<main>

<div class="leagues">

<button onclick="showLeague('seriea')">Serie A</button>
<button onclick="showLeague('premier')">Premier League</button>
<button onclick="showLeague('laliga')">La Liga</button>
<button onclick="showLeague('nazionali')">Nazionali</button>

</div>


<div id="seriea" class="products">

<button onclick="selectTeam('Milan','assets/milan.webp')">
<img src="assets/milan.webp">
Milan
</button>

<button onclick="selectTeam('Inter','assets/inter.webp')">
<img src="assets/inter.webp">
Inter
</button>

<button onclick="selectTeam('Juventus','assets/juve.webp')">
<img src="assets/juve.webp">
Juventus
</button>

</div>


<div id="premier" class="products">

<button onclick="selectTeam('Manchester City','assets/city.webp')">
<img src="assets/city.webp">
Man City
</button>

<button onclick="selectTeam('Chelsea','assets/chelsea.webp')">
<img src="assets/chelsea.webp">
Chelsea
</button>

</div>


<div id="laliga" class="products">

<button onclick="selectTeam('Real Madrid','assets/real.webp')">
<img src="assets/real.webp">
Real Madrid
</button>

<button onclick="selectTeam('Barcellona','assets/barcellona.webp')">
<img src="assets/barcellona.webp">
Barcellona
</button>

</div>


<div id="nazionali" class="products">

<button onclick="selectTeam('Italia','assets/italy.webp')">
<img src="assets/italy.webp">
Italia
</button>

<button onclick="selectTeam('Portogallo','assets/portogallo.webp')">
<img src="assets/portogallo.webp">
Portogallo
</button>

</div>



<div id="formContainer">

<img id="productImage" class="product-img">

<h2 id="teamTitle"></h2>

<label>Taglia</label>

<select id="size">

<option>S</option>
<option selected>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>

</select>


<label class="checkbox">

<input type="checkbox" id="custom">

Personalizzazione (+5€)

</label>


<div id="customFields">

<input type="text" id="customName" placeholder="Nome">

<input type="text" id="customNumber" placeholder="Numero">

</div>


<label>Patch</label>

<select id="patchType">

<option value="0">Nessuna</option>
<option value="2">Serie A +2€</option>
<option value="2">Champions +2€</option>

</select>


<p id="price">Prezzo Totale: 30€</p>


<input type="text" id="fullname" placeholder="Nome e cognome">

<input type="text" id="address" placeholder="Indirizzo">

<input type="text" id="phone" placeholder="Telefono">


<button onclick="submitOrder()">Ordina su WhatsApp</button>

</div>

</main>


<footer>

<p>© 2026 GoalWear</p>

</footer>


<script src="script.js"></script>

</body>

</html>
